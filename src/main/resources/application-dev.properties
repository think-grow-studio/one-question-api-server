# HTTPS Server
server.port=443
server.ssl.enabled=true
server.ssl.key-store=file:/certs/origin.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}

# Management Server (HTTP, internal monitoring only)
management.server.port=8080
management.server.ssl.enabled=false
management.endpoints.web.exposure.include=prometheus,health
management.endpoint.health.show-details=always

# Datasource (Environment variables)
spring.datasource.url=${ORACLE_DB_URL}
spring.datasource.driver-class-name=${ORACLE_DB_DRIVER}
spring.datasource.username=${ORACLE_DB_USERNAME}
spring.datasource.password=${ORACLE_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

# App Version (Dev Environment)
app.version.min=${APP_VERSION_MIN}
app.version.latest=${APP_VERSION_LATEST}
app.server.live=${APP_SERVER_LIVE}

# Logging (Moderate)
logging.level.org.hibernate.SQL=INFO
