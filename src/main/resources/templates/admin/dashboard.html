<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - One Question Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        .header {
            background: #fff;
            padding: 16px 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left { display: flex; align-items: center; gap: 24px; }
        .header h1 { font-size: 20px; color: #333; }
        .nav { display: flex; gap: 4px; }
        .nav a {
            padding: 6px 14px; border-radius: 6px; font-size: 14px;
            text-decoration: none; color: #555; transition: background-color 0.15s;
        }
        .nav a:hover { background-color: #f0f4ff; color: #4A90D9; }
        .nav a.active { background-color: #EBF4FF; color: #4A90D9; font-weight: 600; }
        .btn-logout {
            padding: 8px 16px; background-color: #e0e0e0; color: #555; border: none;
            border-radius: 6px; font-size: 14px; cursor: pointer; transition: background-color 0.2s;
        }
        .btn-logout:hover { background-color: #d0d0d0; }
        .content { max-width: 1400px; margin: 32px auto; padding: 0 24px; }
        .page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }

        /* Stats Cards */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: #fff; border-radius: 10px; padding: 20px 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .stat-label { font-size: 13px; color: #888; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; color: #333; line-height: 1; }
        .stat-sub { font-size: 12px; color: #aaa; margin-top: 6px; }
        .badge-existing { color: #4A90D9; font-weight: 600; }
        .badge-new { color: #52C41A; font-weight: 600; }

        /* Two-column row */
        .two-col { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; margin-bottom: 24px; }

        /* Cards */
        .card {
            background: #fff; border-radius: 10px; padding: 20px 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 24px;
        }
        .card:last-child { margin-bottom: 0; }
        .card-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 16px; }

        /* Tables */
        .data-table {
            width: 100%; border-collapse: collapse;
        }
        .data-table th {
            background-color: #f8f9fa; padding: 10px 14px; text-align: left;
            font-size: 12px; color: #666; font-weight: 600;
            border-bottom: 1px solid #e9ecef; white-space: nowrap;
        }
        .data-table td {
            padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover { background-color: #f8f9ff; }

        /* Scroll container */
        .scroll-container { max-height: 480px; overflow-y: auto; }
        .scroll-container .data-table { border-collapse: separate; border-spacing: 0; }
        .scroll-container .data-table thead th {
            position: sticky; top: 0; z-index: 1;
            box-shadow: 0 1px 0 #e9ecef;
        }

        /* Bar chart cell */
        .bar-cell { display: flex; align-items: center; gap: 8px; }
        .bar-track { flex: 1; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; display: flex; }
        .bar-fill { height: 100%; background: #4A90D9; }
        .bar-fill-new { height: 100%; background: #52C41A; }

        /* Bar legend */
        .bar-legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: #555; }
        .bar-legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
        .legend-existing { background: #4A90D9; }
        .legend-new { background: #52C41A; }

        /* Rank badges */
        .rank { display: inline-flex; align-items: center; justify-content: center;
                width: 24px; height: 24px; border-radius: 50%;
                font-size: 12px; font-weight: 700; }
        .rank-1 { background: #FFD700; color: #333; }
        .rank-2 { background: #C0C0C0; color: #333; }
        .rank-3 { background: #CD7F32; color: #fff; }
        .rank-n { background: #f0f0f0; color: #888; }

        /* Truncated text */
        .truncate { display: inline-block; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }

        .empty-state {
            padding: 32px; text-align: center; color: #aaa; font-size: 14px;
        }

        /* Mobile responsive */
        @media (max-width: 900px) {
            .two-col { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .content { padding: 16px 12px; margin: 16px auto; }
            .page-title { font-size: 18px; margin-bottom: 16px; }
            .card { padding: 16px; }
            .stat-value { font-size: 26px; }
            .header h1 { font-size: 16px; }
            .col-hide-mobile { display: none; }
            .truncate { max-width: 140px; }
        }
        @media (max-width: 480px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card { padding: 14px 16px; }
            .stat-value { font-size: 22px; }
            .header { padding: 12px 16px; }
            .header-left { gap: 12px; }
            .nav a { padding: 5px 10px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-left">
        <h1>One Question Admin</h1>
        <nav class="nav">
            <a href="/admin/dashboard" class="active">대시보드</a>
            <a href="/admin/answer-posts">AI 답변 피드</a>
        </nav>
    </div>
    <form method="post" action="/admin/logout">
        <button type="submit" class="btn-logout">로그아웃</button>
    </form>
</div>

<div class="content">
    <h2 class="page-title">대시보드</h2>

    <!-- Stats Cards -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">전체 회원</div>
            <div class="stat-value" th:text="${stats.totalMembers()}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">전체 답변</div>
            <div class="stat-value" th:text="${stats.totalAnswers()}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">오늘 답변</div>
            <div class="stat-value" th:text="${stats.todayAnswers()}">0</div>
            <div class="stat-sub">
                <span class="badge-existing" th:text="'기존 ' + ${stats.todayExistingAnswers()}">기존 0</span>
                &nbsp;/&nbsp;
                <span class="badge-new" th:text="'신규 ' + ${stats.todayNewAnswers()}">신규 0</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-label">WAU (주간 활성)</div>
            <div class="stat-value" th:text="${stats.wauCount()}">0</div>
            <div class="stat-sub">최근 7일, 3회 이상</div>
        </div>
    </div>

    <!-- Daily Trend + WAU Members -->
    <div class="two-col">
        <div class="card" style="margin-bottom:0;">
            <div class="card-title">일자별 답변 추이 (최근 30일)</div>
            <div th:if="${#lists.isEmpty(dailyTrend)}" class="empty-state">데이터가 없습니다.</div>
            <div th:if="${!#lists.isEmpty(dailyTrend)}">
                <div class="bar-legend">
                    <div class="bar-legend-item">
                        <div class="legend-dot legend-existing"></div>
                        <span>기존 유저</span>
                    </div>
                    <div class="bar-legend-item">
                        <div class="legend-dot legend-new"></div>
                        <span>신규 유저</span>
                    </div>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width:110px;">날짜</th>
                            <th style="width:50px;text-align:right;" class="col-hide-mobile">기존</th>
                            <th style="width:50px;text-align:right;" class="col-hide-mobile">신규</th>
                            <th style="width:50px;text-align:right;">합계</th>
                            <th>비율</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${dailyTrend}">
                            <td th:text="${row.date()}"></td>
                            <td style="text-align:right;color:#4A90D9;font-weight:600;" th:text="${row.existingCount()}" class="col-hide-mobile"></td>
                            <td style="text-align:right;color:#52C41A;font-weight:600;" th:text="${row.newCount()}" class="col-hide-mobile"></td>
                            <td style="text-align:right;font-weight:600;" th:text="${row.count()}"></td>
                            <td>
                                <div class="bar-cell">
                                    <div class="bar-track">
                                        <div class="bar-fill"
                                             th:style="'width:' + ${maxDailyCount > 0 ? (row.existingCount() * 100 / maxDailyCount) : 0} + '%'"></div>
                                        <div class="bar-fill-new"
                                             th:style="'width:' + ${maxDailyCount > 0 ? (row.newCount() * 100 / maxDailyCount) : 0} + '%'"></div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card" style="margin-bottom:0;">
            <div class="card-title">
                WAU 멤버
                <span style="font-size:13px;font-weight:400;color:#888;">(최근 7일, 3회↑)</span>
                &nbsp;<span th:text="'총 ' + ${#lists.size(wauMembers)} + '명'" style="font-size:13px;color:#4A90D9;font-weight:700;"></span>
            </div>
            <div th:if="${#lists.isEmpty(wauMembers)}" class="empty-state">해당 멤버 없음</div>
            <div th:if="${!#lists.isEmpty(wauMembers)}" class="scroll-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>이름</th>
                            <th style="width:80px;text-align:right;">7일 답변수</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${wauMembers}">
                            <td th:text="${row.fullName()}"></td>
                            <td style="text-align:right;font-weight:600;color:#4A90D9;" th:text="${row.answerCount()}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Leaderboard -->
    <div class="card">
        <div class="card-title">회원별 답변 수</div>
        <div th:if="${#lists.isEmpty(leaderboard)}" class="empty-state">데이터가 없습니다.</div>
        <div th:if="${!#lists.isEmpty(leaderboard)}" class="scroll-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width:60px;">순위</th>
                        <th>이름</th>
                        <th style="width:110px;" class="col-hide-mobile">가입일</th>
                        <th style="width:90px;">총 답변수</th>
                        <th style="width:160px;" class="col-hide-mobile">마지막 답변</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row, stat : ${leaderboard}">
                        <td>
                            <span th:if="${stat.index == 0}" class="rank rank-1">1</span>
                            <span th:if="${stat.index == 1}" class="rank rank-2">2</span>
                            <span th:if="${stat.index == 2}" class="rank rank-3">3</span>
                            <span th:if="${stat.index >= 3}" class="rank rank-n" th:text="${stat.index + 1}"></span>
                        </td>
                        <td th:text="${row.fullName()}"></td>
                        <td th:text="${row.joinedDate()}" class="col-hide-mobile"></td>
                        <td style="font-weight:600;" th:text="${row.answerCount()}"></td>
                        <td th:text="${#temporals.format(row.lastAnsweredAt(), 'yyyy-MM-dd HH:mm')}" class="col-hide-mobile"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Recent Answers -->
    <div class="card">
        <div class="card-title">최근 50 답변</div>
        <div th:if="${#lists.isEmpty(recentAnswers)}" class="empty-state">데이터가 없습니다.</div>
        <table th:if="${!#lists.isEmpty(recentAnswers)}" class="data-table">
            <thead>
                <tr>
                    <th style="width:90px;">이름</th>
                    <th style="width:180px;" class="col-hide-mobile">질문</th>
                    <th>답변</th>
                    <th style="width:150px;" class="col-hide-mobile">답변 시각</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row : ${recentAnswers}">
                    <td th:text="${row.fullName()}"></td>
                    <td class="col-hide-mobile"><span class="truncate" th:text="${row.questionContent()}"></span></td>
                    <td><span class="truncate" style="max-width:400px;" th:text="${row.answerContent()}"></span></td>
                    <td th:text="${#temporals.format(row.answeredAt(), 'yyyy-MM-dd HH:mm')}" class="col-hide-mobile"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
