# HTTPS Server
server.port=443
server.ssl.enabled=true
server.ssl.key-store=file:/certs/origin.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}

# Datasource (Environment variables only - no defaults for security)
spring.datasource.url=${ORACLE_DB_URL}
spring.datasource.driver-class-name=${ORACLE_DB_DRIVER}
spring.datasource.username=${ORACLE_DB_USERNAME}
spring.datasource.password=${ORACLE_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=create

# JWT Configuration
jwt.secret-key=${JWT_SECRET_KEY}
jwt.access-expire-time=${JWT_ACCESS_EXPIRE_TIME}
jwt.refresh-expire-time=${JWT_REFRESH_EXPIRE_TIME}

# OAuth Configuration
google.oauth.web-client-id=${GOOGLE_WEB_CLIENT_ID}

# App Version (Production Environment)
app.version.min=${APP_VERSION_MIN}
app.version.latest=${APP_VERSION_LATEST}
app.server.live=${APP_SERVER_LIVE}

# Management Server (HTTP, internal monitoring only)
management.server.port=8080
management.server.ssl.enabled=false
management.endpoints.web.exposure.include=prometheus,health
management.endpoint.health.show-details=always

# Logging (Minimal)
logging.level.root=WARN
logging.level.org.springframework=INFO
