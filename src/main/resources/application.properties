spring.application.name=one-question

# Discord logging (set via env var DISCORD_WEBHOOK_URL to enable notifications)
logging.discord.webhook-url=${DISCORD_LOGGING_WEBHOOK_URL:}

# JWT Configuration (secret-key must be Base64 encoded, minimum 256 bits)
jwt.secret-key=${JWT_SECRET_KEY:dGVzdC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LTMyYnl0ZXM=}
jwt.access-expire-time=${JWT_ACCESS_EXPIRE_TIME:3600000}
jwt.refresh-expire-time=${JWT_REFRESH_EXPIRE_TIME:604800000}

# OAuth Configuration
google.oauth.web-client-id=${GOOGLE_WEB_CLIENT_ID:414345295903-18bi0jgjfskfdleb8h85o9t1oms71pgh.apps.googleusercontent.com}
apple.oauth.client-id=${APPLE_CLIENT_ID:test-client-id}
# Apple Sign In: revoke를 위한 client_secret JWT 서명 정보 (Apple Developer Console에서 발급)
apple.oauth.team-id=${APPLE_TEAM_ID:test-team-id}
apple.oauth.key-id=${APPLE_KEY_ID:test-key-id}
# .p8 파일의 PEM 내용을 통째로. 환경변수 주입 시 줄바꿈은 \n으로 escape하거나 멀티라인 지원 secret 매니저 사용
apple.oauth.private-key=${APPLE_PRIVATE_KEY:test-private-key}

# Firebase Configuration
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# Admin Configuration
admin.email=${ADMIN_EMAIL:test@test.com}
